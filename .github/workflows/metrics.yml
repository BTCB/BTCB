name: GitHub Metrics

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00 (北京时间 10:00)
  workflow_dispatch:        # 支持手动触发

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Stats overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: BTCB
          filename: assets/github-metrics.svg
          template: classic
          base: header
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Shanghai
          output_action: none

      - name: Top languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: BTCB
          filename: assets/github-languages.svg
          template: classic
          base: header
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 30
          config_timezone: Asia/Shanghai
          output_action: none

      - name: Apply Cobalt Forge theme
        run: |
          for f in assets/github-metrics.svg assets/github-languages.svg; do
            [ -f "$f" ] || { echo "Skip: $f not found"; continue; }
            sed -i \
              -e 's/#9be9a8/#bae6fd/g' \
              -e 's/#40c463/#38bdf8/g' \
              -e 's/#30a14e/#0284c7/g' \
              -e 's/#216e39/#0369a1/g' \
              -e 's/#ebedf0/#e2e8f0/g' \
              -e 's/#0366d6/#1e40af/g' \
              -e 's/"#959da5"/"#0284c7"/g' \
              -e 's/fill:#959da5/fill:#0284c7/g' \
              "$f"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-metrics.svg assets/github-languages.svg
          git diff --cached --quiet || (git commit -m "chore: update GitHub metrics [skip ci]" && git push)
